<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OG template</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Changa+One&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#fff}
  .card{
    position:relative;width:1200px;height:630px;overflow:hidden;
    background:#FFFFFF;font-family:"Inter",sans-serif;color:#0A0B0D;
  }
  .block{position:absolute;border-radius:48px}
  .b1{background:#E7F1FF;width:340px;height:260px;right:-80px;top:-80px}
  .b2{background:#E4F9F2;width:270px;height:240px;right:-120px;top:120px}
  .b3{background:#FFEEE9;width:310px;height:260px;right:-80px;top:300px}
  .b4{background:#FFF6E1;width:280px;height:200px;right:-140px;top:500px}
  .inner{position:relative;padding:64px 90px}
  .lockup{display:flex;align-items:center;gap:14px}
  .lockup svg{width:44px;height:44px}
  .lockup .word{font-family:"Changa One";font-size:34px;letter-spacing:.01em}
  .lockup .sub{font-size:26px;color:#5B5F66;font-weight:500}
  .eyebrow{margin-top:52px;font-size:21px;font-weight:600;letter-spacing:.22em;color:#5B5F66;text-transform:uppercase}
  h1{font-family:"Changa One";font-weight:400;font-size:92px;line-height:1.02;letter-spacing:.005em;margin-top:22px;max-width:15ch}
  .lead{margin-top:26px;font-size:30px;color:#5B5F66;max-width:34ch}
  .chips{display:flex;gap:16px;margin-top:36px}
  .chip{border:2px solid #E6E8EB;background:#F5F6F7;border-radius:999px;padding:12px 24px;font-size:21px;font-weight:600;color:#5B5F66}
</style>
</head>
<body>
<div class="card">
  <div class="block b1"></div>
  <div class="block b2"></div>
  <div class="block b3"></div>
  <div class="block b4"></div>
  <div class="inner">
    <div class="lockup">
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><circle cx="24" cy="24" r="13" fill="none" stroke="#0A0B0D" stroke-width="4.5"/><circle cx="24" cy="11" r="4.2" fill="#0A0B0D"/><circle cx="36.4" cy="20" r="4.2" fill="#0A0B0D"/><circle cx="31.6" cy="34.5" r="4.2" fill="#0A0B0D"/><circle cx="16.4" cy="34.5" r="4.2" fill="#0A0B0D"/><circle cx="11.6" cy="20" r="4.2" fill="#0A0B0D"/><circle cx="24" cy="24" r="5" fill="#2E90FA"/></svg>
      <span class="word">NexHelix</span><span class="sub">· Research</span>
    </div>
    <div class="eyebrow">A short research survey · 7 min</div>
    <h1>How do you really work with AI?</h1>
    <p class="lead">For people who don't write code but get real work done with AI.</p>
    <div class="chips">
      <span class="chip">7 minutes</span>
      <span class="chip">6 short parts</span>
      <span class="chip">Anonymous unless you opt in</span>
    </div>
  </div>
</div>
</body>
</html>
